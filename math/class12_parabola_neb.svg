  <!-- Parabola curve: y² = 4ax, a = 100, vertex at (340, 240) -->
  <!-- x = vertex_x + t²/(4a), y = vertex_y + t  => parametric -->
  <path d="&#10;    M 340 240&#10;    C 350 180, 390 130, 440 80&#10;    C 390 130, 350 180, 340 240&#10;    C 350 300, 390 350, 440 400&#10;    C 480 430, 520 452, 560 460&#10;    M 340 240&#10;    C 350 180, 390 130, 440 80&#10;    C 480 50, 520 28, 560 20&#10;  " fill="none" stroke="var(--color-text-primary)" stroke-width="2" stroke-linecap="round" mask="url(#imagine-text-gaps-dj4rp3)" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Smooth single parabola path using quadratic bezier -->
  <path d="M 560 20 Q 340 240 560 460" fill="none" stroke="var(--color-text-primary)" stroke-width="2.5" mask="url(#imagine-text-gaps-dj4rp3)" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Focus point at (340+100, 240) = (440, 240) -->
  <circle cx="440" cy="240" r="4" fill="var(--color-text-primary)" style="fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="444" y="232" dominant-baseline="central" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:central">F(a, 0)</text>

